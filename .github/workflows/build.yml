name: Build

on: [push, pull_request]

permissions:
  contents: read
  actions: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xms64m -Xmx512m
  MAVEN_CLI_OPTS: -s .mvn/settings.xml -B -Dfrontend-build -Ddocker-build
  MAVEN_GOALS: clean verify
  DOCKER_REGISTRY: ghcr.io
  DOCKER_REPO: ${{ github.repository_owner }}
  DOCKER_IMAGE: karaplan

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          settings-path: ${{ github.workspace }}/.mvn
      - name: Build webapp
        run: ./mvnw ${MAVEN_CLI_OPTS} ${MAVEN_GOALS} -DskipTests
      - name: Test webapp
        run: ./mvnw ${MAVEN_CLI_OPTS} test
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webapp
          path: target/karaplan.war
      - name: Publish artifacts
        if: github.ref_type == 'tag'
        run: ./mvnw ${MAVEN_CLI_OPTS} deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to Docker registry
        if: github.ref_type == 'tag' || github.ref_name == 'master'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Prepare Docker metadata
        if: github.ref_type == 'tag' || github.ref_name == 'master'
        id: docker_meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=raw,value={{branch}}-{{date 'YYYYMMDD-HHmm'}}-{{sha}},enable=${{ github.ref_type != 'tag' }}
      - name: Build and push Docker image
        if: github.ref_type == 'tag' || github.ref_name == 'master'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: target/docker-build
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
