name: Build

on: [push, pull_request]

permissions:
  contents: read
  actions: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xms64m -Xmx512m
  MAVEN_CLI_OPTS: -s .mvn/settings.xml -B -Dfrontend-build -Ddocker-build
  MAVEN_GOALS: clean verify
  DOCKER_REGISTRY: ghcr.io
  DOCKER_REPO: ${{ github.repository_owner }}
  DOCKER_IMAGE: karaplan

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          settings-path: ${{ github.workspace }}/.mvn
      - name: Build webapp
        run: ./mvnw ${MAVEN_CLI_OPTS} ${MAVEN_GOALS} -DskipTests
      - name: Test webapp
        run: ./mvnw ${MAVEN_CLI_OPTS} test
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webapp
          path: target/karaplan.war
      - name: Publish artifacts
        if: github.ref_type == 'tag'
        run: ./mvnw ${MAVEN_CLI_OPTS} deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Login to Docker registry
        if: github.ref_type == 'tag' || github.ref_name == 'master'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Prepare Docker metadata
        if: github.ref_type == 'tag' || github.ref_name == 'master'
        id: docker_meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=raw,value={{branch}}-{{date 'YYYYMMDD-HHmm'}}-{{sha}},enable=${{ github.ref_type != 'tag' }}
      - name: Build and push Docker image
        if: github.ref_type == 'tag' || github.ref_name == 'master'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: target/docker-build
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
